<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kasir Pancong</title>

<link rel="icon" href="foto/logogram.png">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff9800">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">


</head>

<body>

<div class="container">

<h1>Kasir Pancong 💸</h1>

<input type="text" id="nama" placeholder="Nama">
<input type="text" id="nomor" placeholder="Nomor WA">

<div id="orderItems"></div>

<button class="add-btn" onclick="tambahItem()">+ Tambah Menu</button>

<h3>Total: <span class="total" id="totalHarga">Rp0</span></h3>

<input type="number" id="bayar" placeholder="Uang Bayar">

<h3>Kembalian: <span class="total" id="kembalian">Rp0</span></h3>

<button class="pay-btn" onclick="bayar()">Bayar</button>

</div>

<script>

// =====================
// SPREADSHEET
// =====================
const SPREADSHEET_URL = "https://script.google.com/macros/s/AKfycbzP2c88emdVSn7BUrcQzBtGPuu3SxKNPCigq7QsAgT4lsXvnoOrMt5MmcyRMfKCXPTGpA/exec";


// =====================
// HARGA MENU
// =====================
const hargaMenu = {
  original:{S:8000,M:14000,L:16000},
  taro:{S:10000,M:17000,L:20000},
  cappucino:{S:10000,M:17000,L:20000},
  greentea:{S:10000,M:17000,L:20000},
  redvelvet:{S:10000,M:17000,L:20000},
  darkchoco:{S:11000,M:18000,L:22000},
  tiramisu:{S:11000,M:18000,L:22000},
  chococrunchy:{S:11000,M:18000,L:22000}
};

const hargaTopping = {
  meses:{S:2000,M:3000,L:4000},
  milo:{S:2000,M:3000,L:4000},
  chocochip:{S:2000,M:3000,L:4000},
  oreo:{S:2000,M:4000,L:4000},
  keju:{S:3000,M:4000,L:6000},
  almond:{S:3000,M:4000,L:6000},
  regal:{S:3000,M:4000,L:6000}
};


// =====================
// TAMBAH ITEM
// =====================
function tambahItem(){

  const item = document.createElement("div");
  item.classList.add("order-item");

  item.innerHTML = `
  <select class="rasa">
    <option value="original">Original</option>
    <option value="taro">Taro</option>
    <option value="cappucino">Cappucino</option>
    <option value="greentea">Green Tea</option>
    <option value="redvelvet">Red Velvet</option>
    <option value="darkchoco">Dark Choco</option>
    <option value="tiramisu">Tiramisu</option>
    <option value="chococrunchy">Choco Crunchy</option>
  </select>

  <select class="size">
    <option value="S">S</option>
    <option value="M">M</option>
    <option value="L">L</option>
  </select>

  <select class="kematangan">
    <option>Matang</option>
    <option>Lumer</option>
  </select>

  <input type="number" class="qty" value="1" min="1">

  <div class="topping">
    <label><input type="checkbox" value="meses"><span>Meses</span></label>
    <label><input type="checkbox" value="milo"><span>Milo</span></label>
    <label><input type="checkbox" value="chocochip"><span>Choco Chip</span></label>
    <label><input type="checkbox" value="oreo"><span>Oreo</span></label>
    <label><input type="checkbox" value="keju"><span>Keju</span></label>
    <label><input type="checkbox" value="almond"><span>Almond</span></label>
    <label><input type="checkbox" value="regal"><span>Regal</span></label>
</div>

  <button class="delete-btn" onclick="this.parentElement.remove();updateTotal()">Hapus</button>
  `;

  document.getElementById("orderItems").appendChild(item);

  item.querySelectorAll("select,input")
    .forEach(el=>el.addEventListener("input", updateTotal));

  updateTotal();
}


// =====================
// HITUNG TOTAL
// =====================
function updateTotal(){

  let total = 0;

  document.querySelectorAll(".order-item").forEach(item=>{

    const rasa = item.querySelector(".rasa").value;
    const size = item.querySelector(".size").value;
    const qty = parseInt(item.querySelector(".qty").value);

    let harga = hargaMenu[rasa][size];

    let toppingTotal = 0;

    item.querySelectorAll('input[type="checkbox"]:checked')
      .forEach(t => toppingTotal += hargaTopping[t.value][size]);

    total += (harga + toppingTotal) * qty;
  });

  document.getElementById("totalHarga").innerText =
    "Rp" + total.toLocaleString("id-ID");
}


// =====================
// KEMBALIAN
// =====================
document.getElementById("bayar").addEventListener("input", function(){

  const total = parseInt(
    document.getElementById("totalHarga").innerText.replace(/[^0-9]/g,'')
  ) || 0;

  const kembali = this.value - total;

  document.getElementById("kembalian").innerText =
    kembali >= 0 ? "Rp"+kembali.toLocaleString("id-ID") : "Kurang";
});


// =====================
// BAYAR
// =====================
function bayar(){

  const nama = document.getElementById("nama").value;
  const nomor = document.getElementById("nomor").value;

  let detail = "";

  document.querySelectorAll(".order-item").forEach((item,i)=>{

    const rasa = item.querySelector(".rasa").value;
    const size = item.querySelector(".size").value;
    const kematangan = item.querySelector(".kematangan").value;
    const qty = item.querySelector(".qty").value;

    let topping = [];
    item.querySelectorAll('input[type="checkbox"]:checked')
      .forEach(t => topping.push(t.value));

    detail += `Item ${i+1}: ${rasa} (${size}) ${kematangan} x${qty} | ${topping.join(", ") || "-"} | `;
  });

  const total = document.getElementById("totalHarga").innerText;

  const uangBayar = parseInt(document.getElementById("bayar").value) || 0;

    const totalAngka = parseInt(
    document.getElementById("totalHarga").innerText.replace(/[^0-9]/g,'')
    ) || 0;

    const kembali = uangBayar - totalAngka;

  const params = new URLSearchParams({
  nama,
  nomor,
  detail,
  total: totalAngka,
  bayar: uangBayar,
  kembalian: kembali
});

 fetch(SPREADSHEET_URL + "?" + params.toString())
  .then(res => res.text())
  .then(res => {
    console.log("Response:", res);
    alert("✅ Transaksi berhasil!");
    location.reload();
  })
  .catch(err => {
    console.error(err);
    alert("❌ Gagal kirim ke spreadsheet");
  });
}


// =====================
// SERVICE WORKER
// =====================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}


// AUTO LOAD
tambahItem();

</script>

</body>
</html>
